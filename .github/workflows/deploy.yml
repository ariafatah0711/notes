name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      VERSION_PREFIX: "1"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Informasion
        run: |
          echo "COMMIT_NUMBER=$(git rev-list --count HEAD)" >> $GITHUB_ENV
          echo "VITE_VERSION=$VERSION_PREFIX.$COMMIT_NUMBER" >> $GITHUB_ENV
          echo "Version: $VERSION_PREFIX.$COMMIT_NUMBER"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Set Environment Variables
        run: |
          echo "VITE_NOTES_PASSWORD=${{ secrets.VITE_NOTES_PASSWORD }}" >> .env
          echo "VITE_API_DOMAIN=${{ vars.VITE_API_DOMAIN }}" >> .env
          echo "VITE_VERSION=$VITE_VERSION" >> .env

      - name: Build Project
        run: npm run build

      - name: Generate .nojekyll
        run: echo > dist/.nojekyll

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Deploy to GitHub Pages
        run: |
          git checkout --orphan gh-pages
          git --work-tree dist add --all
          git --work-tree dist commit -m "Deploy to GitHub Pages"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:gh-pages --force